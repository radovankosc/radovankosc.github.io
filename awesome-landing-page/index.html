<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - Awesome Landing Page</title>

<body>
<!-- partial:index.partial.html -->
<div class="container">
  <h1>Awesome Landing Page</h1>
  <div class="cardContainer">
    <div class="card" id="plant-a-tree">
    <img src="https://raw.githubusercontent.com/green-fox-academy/myfirstapp-syllabus/master/assets/tree.png
" alt="planting a tree">
    <p>Plant a tree</p>
  </div>
    <div class="card" id="make-friends">
    <img src="https://raw.githubusercontent.com/green-fox-academy/myfirstapp-syllabus/master/assets/deal.png
" alt="handshake">
    <p>Make friends</p>
  </div>
    <div class="card" id="money-bag">
    <img src="https://raw.githubusercontent.com/green-fox-academy/myfirstapp-syllabus/master/assets/money.png
" alt="Hand holding a bag of money">
    <p>Profit</p>
  </div>
  </div>
  
  
  <form action="http://www.example.com" id="newsletter">
    <div class="signUpForm">
      <h2>Newsletter</h2>
      <p>Sign up to our newsletter to recieve awesome news about fresh air.</p>
      <input type="text">
      <button type="submit">Subscribe</button>
      <p>
        <input type="checkbox" id="terms">
        <label for="terms">I accept the <a href="http://www.example.com">terms and conditions</a></label>
      </p>
      <div class=closeButton id="closeButton">
        x
      </div>
    </div>
  </form>
</div>
<div id="questionMark">
  ?
</div>
